services:
  google-bring-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: google-bring-sync:latest
    container_name: google-bring-sync
    restart: unless-stopped
    # Reads all variables from the local .env file (see .env.example for the
    # full list). Keep .env out of version control.
    env_file:
      - .env
    # Cap container logs so the per-minute cron output cannot fill the disk.
    # json-file rotates at max-size and keeps at most max-file files
    # (here 3 x 10 MB = 30 MB max).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
