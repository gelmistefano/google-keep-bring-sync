services:
  google-bring-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: google-bring-sync:latest
    container_name: google-bring-sync
    restart: unless-stopped
    # Reads all variables from the local .env file (see .env.example for the
    # full list). Keep .env out of version control.
    env_file:
      - .env
